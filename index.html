<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LinkedIn Content Tracker</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-database-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyBClelPfksWgYRO6oTd721hvWmItfIaFBY",
      authDomain: "linkedin-content-tracker.firebaseapp.com",
      databaseURL: "https://linkedin-content-tracker-default-rtdb.firebaseio.com",
      projectId: "linkedin-content-tracker",
      storageBucket: "linkedin-content-tracker.firebasestorage.app",
      messagingSenderId: "743006715017",
      appId: "1:743006715017:web:f660d4c480487c14f29a58"
    };
    const firebaseApp = firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const auth = firebase.auth();
    const googleProvider = new firebase.auth.GoogleAuthProvider();
  </script>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    // Icon components using Lucide
    const Icon = ({ name, size = 16, className = '' }) => {
      const ref = React.useRef(null);
      useEffect(() => {
        if (ref.current) {
          ref.current.innerHTML = '';
          const icon = lucide.createElement(lucide.icons[name]);
          icon.setAttribute('width', size);
          icon.setAttribute('height', size);
          if (className) icon.setAttribute('class', className);
          ref.current.appendChild(icon);
        }
      }, [name, size, className]);
      return <span ref={ref} style={{ display: 'inline-flex', verticalAlign: 'middle' }} />;
    };

    const LinkedInContentSystem = () => {
      const [ideas, setIdeas] = useState([]);
      const [scheduledPosts, setScheduledPosts] = useState([]);
      const [newIdea, setNewIdea] = useState('');
      const [selectedIdea, setSelectedIdea] = useState(null);
      const [generatedPost, setGeneratedPost] = useState('');
      const [scheduleDate, setScheduleDate] = useState('');
      const [activeTab, setActiveTab] = useState('strategy');
      const [editingPost, setEditingPost] = useState(null);
      const [editingSchedule, setEditingSchedule] = useState(null);
      const [expandedIdea, setExpandedIdea] = useState(null);
      const [categoryFilter, setCategoryFilter] = useState('All');
      const [editingIdeaContent, setEditingIdeaContent] = useState(null);
      const [postedIdeas, setPostedIdeas] = useState([]);
      const [postedCategoryFilter, setPostedCategoryFilter] = useState('All');
      const [postedAudienceFilter, setPostedAudienceFilter] = useState('All');
      const [expandedPostedIdea, setExpandedPostedIdea] = useState(null);
      const [audienceFilter, setAudienceFilter] = useState('All');
      const [showSettings, setShowSettings] = useState(false);
      const [newTopic, setNewTopic] = useState('');
      const [newAudience, setNewAudience] = useState('');
      const [firebaseReady, setFirebaseReady] = useState(false);
      const [contributorName, setContributorName] = useState('');
      const [currentUser, setCurrentUser] = useState(null);
      const [authLoading, setAuthLoading] = useState(true);
      const [draftedPosts, setDraftedPosts] = useState([]);
      const [showApiKey, setShowApiKey] = useState(false);
      const [generatingAI, setGeneratingAI] = useState(false);
      const [generatedVariations, setGeneratedVariations] = useState([]);
      const [polishingId, setPolishingId] = useState(null);
      const [expandedDraft, setExpandedDraft] = useState(null);
      const [draftScheduleDate, setDraftScheduleDate] = useState('');
      const [editingDraftId, setEditingDraftId] = useState(null);

      // Strategy tab state
      const [strategicInsights, setStrategicInsights] = useState(null);
      const [chatMessages, setChatMessages] = useState([]);
      const [chatInput, setChatInput] = useState('');
      const [chatImages, setChatImages] = useState([]); // [{base64, mediaType, preview, name}]
      const [chatLoading, setChatLoading] = useState(false);
      const chatImageRef = React.useRef(null);
      const [expandedInsight, setExpandedInsight] = useState(null);
      const [chatServerReady, setChatServerReady] = useState(false);
      const [marketScanning, setMarketScanning] = useState(false);

      const defaultTopics = ['User Pain Points', 'Market Trend', 'Good Practices', 'Professional Insights', 'Random'];
      const defaultAudiences = ['Currently Unemployed', 'Employed & Seeking', 'Career Changers', 'General'];

      const [topics, setTopics] = useState(defaultTopics);
      const [audiences, setAudiences] = useState(defaultAudiences);

      // Track whether state changes come from Firebase (to avoid write-back loops)
      const fromFirebase = React.useRef(false);

      const categories = topics;

      const [sourceFilter, setSourceFilter] = useState('All');

      const activeIdeas = ideas.filter(idea => idea.status !== 'posted');
      const filteredIdeas = activeIdeas.filter(idea => {
        const matchesCategory = categoryFilter === 'All' || idea.category === categoryFilter;
        const matchesAudience = audienceFilter === 'All' || idea.audience === audienceFilter;
        const matchesSource = sourceFilter === 'All' ||
          (sourceFilter === 'Agent' ? idea.source === 'agent' :
           sourceFilter === 'Strategist' ? idea.source === 'strategist-chat' :
           idea.source !== 'agent' && idea.source !== 'strategist-chat');
        return matchesCategory && matchesAudience && matchesSource;
      });

      const starredIdeas = activeIdeas.filter(idea => idea.starred);
      const activeScheduledPosts = scheduledPosts
        .filter(post => post.status !== 'posted')
        .sort((a, b) => new Date(a.scheduledFor) - new Date(b.scheduledFor));
      const filteredPostedIdeas = postedIdeas.filter(idea => {
        const matchesCategory = postedCategoryFilter === 'All' || idea.category === postedCategoryFilter;
        const matchesAudience = postedAudienceFilter === 'All' || idea.audience === postedAudienceFilter;
        return matchesCategory && matchesAudience;
      });

      // Allowed users — only these emails can access the app
      const ALLOWED_EMAILS = ['maggie@getlumira.ai'];

      // Google Auth — listen for auth state
      useEffect(() => {
        const unsubscribe = auth.onAuthStateChanged((user) => {
          if (user && !ALLOWED_EMAILS.includes(user.email)) {
            console.warn('Unauthorized user:', user.email);
            auth.signOut();
            alert('Access denied. This app is restricted to authorized users only.');
            return;
          }
          setCurrentUser(user);
          if (user) {
            console.log('Authenticated UID:', user.uid);
            setContributorName(user.displayName || user.email.split('@')[0]);
          }
          setAuthLoading(false);
        });
        return () => unsubscribe();
      }, []);

      const signIn = () => {
        auth.signInWithPopup(googleProvider).catch((error) => {
          alert('Sign in failed: ' + error.message);
        });
      };

      const signOut = () => {
        auth.signOut();
      };

      // Firebase real-time listeners — load data and stay in sync
      // Only connect after auth is ready (rules require authentication)
      useEffect(() => {
        if (!currentUser) return;

        const refs = {
          ideas: db.ref('ideas'),
          scheduledPosts: db.ref('scheduledPosts'),
          postedIdeas: db.ref('postedIdeas'),
          topics: db.ref('topics'),
          audiences: db.ref('audiences'),
          draftedPosts: db.ref('draftedPosts'),
          strategicInsights: db.ref('strategicInsights'),
          strategistChat: db.ref('strategistChat/messages')
        };

        // Helper: migrate localStorage data to Firebase if Firebase is empty
        const migrateIfNeeded = (firebaseData, localKey, fbRef, defaultVal) => {
          if (!firebaseData) {
            const localData = localStorage.getItem(localKey);
            if (localData) {
              const parsed = JSON.parse(localData);
              if (parsed && (Array.isArray(parsed) ? parsed.length > 0 : true)) {
                fbRef.set(parsed);
                return parsed;
              }
            }
            return defaultVal;
          }
          return Array.isArray(firebaseData) ? firebaseData : Object.values(firebaseData || {});
        };

        refs.ideas.on('value', (snapshot) => {
          fromFirebase.current = true;
          const data = migrateIfNeeded(snapshot.val(), 'linkedin-ideas', refs.ideas, []);
          setIdeas(Array.isArray(data) ? data : Object.values(data || {}));
          fromFirebase.current = false;
          setFirebaseReady(true);
        });

        refs.scheduledPosts.on('value', (snapshot) => {
          fromFirebase.current = true;
          const data = migrateIfNeeded(snapshot.val(), 'linkedin-scheduled', refs.scheduledPosts, []);
          setScheduledPosts(Array.isArray(data) ? data : Object.values(data || {}));
          fromFirebase.current = false;
        });

        refs.postedIdeas.on('value', (snapshot) => {
          fromFirebase.current = true;
          const data = migrateIfNeeded(snapshot.val(), 'linkedin-posted-ideas', refs.postedIdeas, []);
          setPostedIdeas(Array.isArray(data) ? data : Object.values(data || {}));
          fromFirebase.current = false;
        });

        refs.topics.on('value', (snapshot) => {
          fromFirebase.current = true;
          const data = snapshot.val();
          if (data) {
            setTopics(Array.isArray(data) ? data : Object.values(data));
          } else {
            const localTopics = localStorage.getItem('linkedin-topics');
            if (localTopics) {
              const parsed = JSON.parse(localTopics);
              refs.topics.set(parsed);
              setTopics(parsed);
            } else {
              refs.topics.set(defaultTopics);
              setTopics(defaultTopics);
            }
          }
          fromFirebase.current = false;
        });

        refs.audiences.on('value', (snapshot) => {
          fromFirebase.current = true;
          const data = snapshot.val();
          if (data) {
            setAudiences(Array.isArray(data) ? data : Object.values(data));
          } else {
            const localAudiences = localStorage.getItem('linkedin-audiences');
            if (localAudiences) {
              const parsed = JSON.parse(localAudiences);
              refs.audiences.set(parsed);
              setAudiences(parsed);
            } else {
              refs.audiences.set(defaultAudiences);
              setAudiences(defaultAudiences);
            }
          }
          fromFirebase.current = false;
        });

        refs.draftedPosts.on('value', (snapshot) => {
          fromFirebase.current = true;
          const data = snapshot.val();
          if (data) {
            setDraftedPosts(Array.isArray(data) ? data.filter(Boolean) : Object.values(data).filter(Boolean));
          } else {
            setDraftedPosts([]);
          }
          fromFirebase.current = false;
        });


        refs.strategicInsights.on('value', (snapshot) => {
          const val = snapshot.val();
          if (val) setStrategicInsights(val);
        });

        refs.strategistChat.on('value', (snapshot) => {
          const val = snapshot.val();
          if (val) {
            const msgs = Object.values(val).sort((a, b) => a.timestamp - b.timestamp);
            setChatMessages(msgs);
          } else {
            setChatMessages([]);
          }
        });

        // Check if chat server is running
        fetch('http://localhost:8888/chat', { method: 'OPTIONS' })
          .then(() => setChatServerReady(true))
          .catch(() => setChatServerReady(false));

        return () => {
          Object.values(refs).forEach(ref => ref.off());
        };
      }, [currentUser]);

      // Save to Firebase when state changes (skip if change came from Firebase listener)
      useEffect(() => {
        if (!firebaseReady || fromFirebase.current) return;
        db.ref('ideas').set(ideas);
      }, [ideas]);

      useEffect(() => {
        if (!firebaseReady || fromFirebase.current) return;
        db.ref('scheduledPosts').set(scheduledPosts);
      }, [scheduledPosts]);

      useEffect(() => {
        if (!firebaseReady || fromFirebase.current) return;
        db.ref('postedIdeas').set(postedIdeas);
      }, [postedIdeas]);

      useEffect(() => {
        if (!firebaseReady || fromFirebase.current) return;
        db.ref('topics').set(topics);
      }, [topics]);

      useEffect(() => {
        if (!firebaseReady || fromFirebase.current) return;
        db.ref('audiences').set(audiences);
      }, [audiences]);

      useEffect(() => {
        if (!firebaseReady || fromFirebase.current) return;
        db.ref('draftedPosts').set(draftedPosts);
      }, [draftedPosts]);

      const addTopic = () => {
        if (newTopic.trim() && !topics.includes(newTopic.trim())) {
          setTopics([...topics, newTopic.trim()]);
          setNewTopic('');
        }
      };

      const deleteTopic = (topic) => {
        if (topics.length > 1) {
          setTopics(topics.filter(t => t !== topic));
        }
      };

      const addAudience = () => {
        if (newAudience.trim() && !audiences.includes(newAudience.trim())) {
          setAudiences([...audiences, newAudience.trim()]);
          setNewAudience('');
        }
      };

      const deleteAudience = (audience) => {
        if (audiences.length > 1) {
          setAudiences(audiences.filter(a => a !== audience));
        }
      };

      const updateIdeaAudience = (id, audience) => {
        setIdeas(ideas.map(idea =>
          idea.id === id ? { ...idea, audience: audience } : idea
        ));
      };

      // ── Strategist Chat ─────────────────────────────────────────
      const handleChatImageUpload = (e) => {
        const files = Array.from(e.target.files || []);
        files.forEach(file => {
          const reader = new FileReader();
          reader.onload = () => {
            const base64 = reader.result.split(',')[1];
            const mediaType = file.type || 'image/png';
            setChatImages(prev => [...prev, { base64, mediaType, preview: reader.result, name: file.name }]);
          };
          reader.readAsDataURL(file);
        });
        e.target.value = '';
      };

      const sendStrategistMessage = async (message) => {
        if (!chatServerReady) {
          alert('Chat server not running. Start it with: cd linkedin_agent && python chat_server.py');
          return;
        }
        if (!message.trim() && chatImages.length === 0) return;

        // Build the user message content (text + optional images)
        const hasImages = chatImages.length > 0;
        const userContent = [];
        chatImages.forEach(img => {
          userContent.push({
            type: 'image',
            source: { type: 'base64', media_type: img.mediaType, data: img.base64 }
          });
        });
        if (message.trim()) {
          userContent.push({ type: 'text', text: message.trim() });
        }

        // Save to Firebase for display (store image previews for rendering)
        const userMsg = {
          role: 'user',
          content: message.trim(),
          images: hasImages ? chatImages.map(img => ({ preview: img.preview, name: img.name })) : null,
          timestamp: Date.now()
        };
        db.ref('strategistChat/messages').push(userMsg);
        setChatInput('');
        setChatImages([]);
        setChatLoading(true);

        try {
          const insightsContext = strategicInsights ? [
            strategicInsights.userResearch?.fullContent ? `USER RESEARCH: ${strategicInsights.userResearch.fullContent}` : '',
            strategicInsights.userExperience?.fullContent ? `USER INTERVIEWS: ${strategicInsights.userExperience.fullContent}` : '',
            strategicInsights.competitiveLandscape?.fullContent ? `COMPETITIVE LANDSCAPE: ${strategicInsights.competitiveLandscape.fullContent}` : '',
            strategicInsights.jobMarket ? `JOB MARKET: ${JSON.stringify(strategicInsights.jobMarket)}` : '',
            strategicInsights.positioning?.recommendation ? `CURRENT POSITIONING: ${strategicInsights.positioning.recommendation}` : '',
            strategicInsights.positioning?.contentDirections ? `CONTENT DIRECTIONS: ${JSON.stringify(strategicInsights.positioning.contentDirections)}` : '',
          ].filter(Boolean).join('\n\n') : '';

          // Build history with proper content blocks for the API
          const history = chatMessages.map(m => ({ role: m.role, content: m.content }));
          // Current message uses content blocks if it has an image
          history.push({ role: 'user', content: hasImages ? userContent : message.trim() });

          const response = await fetch('http://localhost:8888/chat', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              messages: history.slice(-20),
              insightsContext: insightsContext
            })
          });

          if (!response.ok) {
            const err = await response.json().catch(() => ({}));
            throw new Error(err.error || 'Chat server error');
          }

          const data = await response.json();
          const assistantMsg = {
            role: 'assistant',
            content: data.reply,
            timestamp: Date.now()
          };
          db.ref('strategistChat/messages').push(assistantMsg);
        } catch (err) {
          alert('Strategist chat error: ' + err.message);
        } finally {
          setChatLoading(false);
        }
      };

      const refreshJobMarket = async () => {
        if (!chatServerReady) {
          alert('AI server not running. Start it with: python chat_server.py');
          return;
        }
        setMarketScanning(true);
        try {
          const response = await fetch('http://localhost:8888/scan-market', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({})
          });
          if (!response.ok) {
            const err = await response.json().catch(() => ({}));
            throw new Error(err.error || 'Scan failed');
          }
          // Firebase listener will auto-update the UI
        } catch (err) {
          alert('Job market scan failed: ' + err.message);
        } finally {
          setMarketScanning(false);
        }
      };

      const clearChatHistory = () => {
        if (confirm('Clear all chat history with the Strategist?')) {
          db.ref('strategistChat/messages').remove();
        }
      };

      const addIdeaFromChat = (text) => {
        const ideaText = prompt('Edit the idea before adding to Ideas Bank:', text.substring(0, 300));
        if (!ideaText) return;
        const newChatIdea = {
          id: Date.now(),
          content: ideaText,
          category: topics[0] || 'Random',
          audience: audiences[0] || 'General',
          status: 'idea',
          createdAt: new Date().toISOString(),
          draft: '',
          comments: '',
          starred: true,
          contributor: contributorName || 'Strategist Chat',
          source: 'strategist-chat',
          sources: []
        };
        setIdeas(prev => [newChatIdea, ...prev]);
      };

      const chatEndRef = React.useRef(null);
      useEffect(() => {
        if (chatEndRef.current) {
          chatEndRef.current.scrollIntoView({ behavior: 'smooth' });
        }
      }, [chatMessages, chatLoading]);

      const addIdea = () => {
        if (newIdea.trim()) {
          const idea = {
            id: Date.now(),
            content: newIdea,
            category: topics[0] || 'Random',
            audience: audiences[0] || 'General',
            status: 'idea',
            createdAt: new Date().toISOString(),
            draft: '',
            comments: '',
            starred: false,
            contributor: contributorName || 'Unknown'
          };
          setIdeas([idea, ...ideas]);
          setNewIdea('');
        }
      };

      const deleteIdea = (id) => {
        setIdeas(ideas.filter(idea => idea.id !== id));
        if (selectedIdea?.id === id) {
          setSelectedIdea(null);
          setGeneratedPost('');
        }
      };

      const updateIdeaPriority = (id, priority) => {
        setIdeas(ideas.map(idea =>
          idea.id === id ? { ...idea, category: priority } : idea
        ));
      };

      const toggleStarred = (id) => {
        setIdeas(ideas.map(idea =>
          idea.id === id ? { ...idea, starred: !idea.starred } : idea
        ));
      };

      const generatePostWithAI = async (idea) => {
        if (!chatServerReady) {
          alert('AI server not running. Start it with: python chat_server.py');
          return;
        }
        setSelectedIdea(idea);
        setActiveTab('generate');
        setGeneratingAI(true);
        setGeneratedVariations([]);

        try {
          const prompt = `Idea: ${idea.content}\nCategory: ${idea.category}\nTarget Audience: ${idea.audience || 'General'}${idea.draft ? `\nDraft notes: ${idea.draft}` : ''}`;
          const response = await fetch('http://localhost:8888/generate', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ prompt })
          });

          if (!response.ok) {
            const err = await response.json().catch(() => ({}));
            throw new Error(err.error || `API error: ${response.status}`);
          }

          const data = await response.json();
          setGeneratedVariations(data.variations);
        } catch (err) {
          alert('AI generation failed: ' + err.message);
        } finally {
          setGeneratingAI(false);
        }
      };

      const useThisDraft = (variation) => {
        if (!selectedIdea) return;
        const draftedPost = {
          id: Date.now(),
          ideaId: selectedIdea.id,
          ideaContent: selectedIdea.content,
          category: selectedIdea.category,
          audience: selectedIdea.audience || 'General',
          selectedContent: variation.content,
          status: 'drafted',
          createdAt: new Date().toISOString(),
          contributor: contributorName || 'Unknown',
        };
        setDraftedPosts(prev => [draftedPost, ...prev]);
        setIdeas(ideas.map(i => i.id === selectedIdea.id ? { ...i, status: 'drafted' } : i));
        setSelectedIdea(null);
        setGeneratedVariations([]);
        setActiveTab('drafted');
      };

      const polishWithAI = async (draftId) => {
        if (!chatServerReady) {
          alert('AI server not running. Start it with: python chat_server.py');
          return;
        }
        const draft = draftedPosts.find(d => d.id === draftId);
        if (!draft) return;

        setPolishingId(draftId);
        try {
          const response = await fetch('http://localhost:8888/polish', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ content: draft.selectedContent })
          });

          if (!response.ok) {
            const err = await response.json().catch(() => ({}));
            throw new Error(err.error || `API error: ${response.status}`);
          }

          const data = await response.json();
          setDraftedPosts(prev => prev.map(d =>
            d.id === draftId ? { ...d, selectedContent: data.polished } : d
          ));
        } catch (err) {
          alert('Polish failed: ' + err.message);
        } finally {
          setPolishingId(null);
        }
      };

      const selectVariation = (draftId, variationIdx) => {
        setDraftedPosts(prev => prev.map(d =>
          d.id === draftId ? { ...d, selectedContent: d.variations[variationIdx]?.content || '' } : d
        ));
      };

      const updateDraftContent = (draftId, content) => {
        setDraftedPosts(prev => prev.map(d =>
          d.id === draftId ? { ...d, selectedContent: content } : d
        ));
      };

      const scheduleDraftedPost = (draftId) => {
        const draft = draftedPosts.find(d => d.id === draftId);
        if (!draft || !draftScheduleDate) return;

        const scheduledPost = {
          id: Date.now(),
          ideaId: draft.ideaId,
          content: draft.selectedContent,
          scheduledFor: draftScheduleDate,
          status: 'scheduled',
          createdAt: new Date().toISOString(),
          contributor: draft.contributor || contributorName || 'Unknown'
        };

        setScheduledPosts(prev => [...prev, scheduledPost]);
        setDraftedPosts(prev => prev.filter(d => d.id !== draftId));
        setIdeas(ideas.map(i => i.id === draft.ideaId ? { ...i, status: 'scheduled' } : i));
        setDraftScheduleDate('');
        setActiveTab('scheduled');
      };

      const deleteDraftedPost = (draftId) => {
        const draft = draftedPosts.find(d => d.id === draftId);
        setDraftedPosts(prev => prev.filter(d => d.id !== draftId));
        if (draft) {
          setIdeas(ideas.map(i => i.id === draft.ideaId ? { ...i, status: 'idea' } : i));
        }
      };

      const moveDraftBackToIdeas = (draftId) => {
        const draft = draftedPosts.find(d => d.id === draftId);
        setDraftedPosts(prev => prev.filter(d => d.id !== draftId));
        if (draft) {
          setIdeas(ideas.map(i => i.id === draft.ideaId ? { ...i, status: 'idea' } : i));
        }
      };

      const moveIdeaBackToQueue = (postId) => {
        const post = scheduledPosts.find(p => p.id === postId);
        if (post) {
          setIdeas(ideas.map(idea =>
            idea.id === post.ideaId
              ? { ...idea, status: 'idea' }
              : idea
          ));
          setScheduledPosts(scheduledPosts.filter(p => p.id !== postId));
        }
      };

      const updateIdeaField = (ideaId, field, value) => {
        setIdeas(ideas.map(idea =>
          idea.id === ideaId ? { ...idea, [field]: value } : idea
        ));
      };

      const schedulePost = () => {
        if (selectedIdea && generatedPost && scheduleDate) {
          const scheduledPost = {
            id: Date.now(),
            ideaId: selectedIdea.id,
            content: generatedPost,
            scheduledFor: scheduleDate,
            status: 'scheduled',
            createdAt: new Date().toISOString(),
            contributor: contributorName || 'Unknown'
          };

          setScheduledPosts([...scheduledPosts, scheduledPost]);
          setIdeas(ideas.map(idea =>
            idea.id === selectedIdea.id
              ? { ...idea, status: 'scheduled' }
              : idea
          ));

          setSelectedIdea(null);
          setGeneratedPost('');
          setScheduleDate('');
          setActiveTab('scheduled');
        }
      };

      const updateScheduledPost = (postId, updates) => {
        setScheduledPosts(scheduledPosts.map(post =>
          post.id === postId ? { ...post, ...updates } : post
        ));
      };

      const markAsPosted = (postId) => {
        const post = scheduledPosts.find(p => p.id === postId);
        if (post) {
          const originalIdea = ideas.find(idea => idea.id === post.ideaId);

          if (originalIdea) {
            const postedIdea = {
              id: Date.now() + Math.random(),
              originalIdeaId: originalIdea.id,
              ideaContent: originalIdea.content,
              category: originalIdea.category,
              audience: originalIdea.audience || '',
              postedContent: post.content,
              scheduledFor: post.scheduledFor,
              postedAt: new Date().toISOString(),
              createdAt: originalIdea.createdAt,
              draft: originalIdea.draft,
              comments: originalIdea.comments,
              contributor: originalIdea.contributor || post.contributor || 'Unknown',
              analytics: { impressions: '', likes: '', comments: '', shares: '' }
            };

            setPostedIdeas(prev => [postedIdea, ...prev]);
            setIdeas(ideas.map(idea =>
              idea.id === originalIdea.id
                ? { ...idea, status: 'posted' }
                : idea
            ));
          }

          setScheduledPosts(scheduledPosts.filter(p => p.id !== postId));
        }
      };

      const updatePostedAnalytics = (postedId, field, value) => {
        setPostedIdeas(postedIdeas.map(item =>
          item.id === postedId
            ? { ...item, analytics: { ...(item.analytics || {}), [field]: value } }
            : item

      };

      const deleteScheduledPost = (postId) => {
        const post = scheduledPosts.find(p => p.id === postId);
        setScheduledPosts(scheduledPosts.filter(p => p.id !== postId));

        if (post) {
          setIdeas(ideas.map(idea =>
            idea.id === post.ideaId

        }
      };

      const copyToClipboard = async (text) => {
        try {
          await navigator.clipboard.writeText(text);
          alert('Post copied to clipboard!');
        } catch (err) {
          console.error('Failed to copy text: ', err);

      const exportData = () => {
        const data = {
          ideas: ideas,
          scheduledPosts: scheduledPosts,
          postedIdeas: postedIdeas,
          exportDate: new Date().toISOString(),
          version: '1.1'
        };

        const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `linkedin-content-backup-${new Date().toISOString().split('T')[0]}.json`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);

              // Backfill audience on posted ideas from original ideas
              if (data.postedIdeas && data.ideas) {

                    const original = data.ideas.find(i => i.id === posted.originalIdeaId);
                    return { ...posted, audience: original ? original.audience : '' };
                  }
                  return posted;

              if (data.scheduledPosts) db.ref('scheduledPosts').set(data.scheduledPosts);
              if (data.postedIdeas) db.ref('postedIdeas').set(data.postedIdeas);
              if (data.topics) db.ref('topics').set(data.topics);

                            </span>
                          </div>
                        )}
                      </div>

                      {/* LinkedIn-style engagement bar (fake, for visual feel) */}
                      <div className="px-4 py-2 border-t border-gray-100 flex items-center gap-6 text-xs text-gray-400">
                        <span>👍 Like</span>
                        <span>💬 Comment</span>
                        <span>🔁 Repost</span>
                        <span>📤 Send</span>
                      </div>
                    </div>

                    {/* Action buttons below the card */}
                    <div className="flex items-center gap-3 mt-3 flex-wrap">
                      <button
                        onClick={() => polishWithAI(draft.id)}
                        disabled={polishingId === draft.id || !chatServerReady}
                        className="bg-purple-600 text-white px-4 py-2 rounded-lg hover:bg-purple-700 disabled:bg-gray-400 transition-colors text-sm font-medium flex items-center"
                      >
                        {polishingId === draft.id ? (
                          <><span className="animate-spin mr-2">⏳</span> Polishing...</>
                        ) : (
                          <><Icon name="sparkles" size={14} className="mr-2" /> Polish with AI</>
                        )}
                      </button>
                      <button
                        onClick={() => copyToClipboard(draft.selectedContent || '')}
                        className="text-gray-600 hover:text-gray-800 px-3 py-2 text-sm border border-gray-300 rounded-lg hover:bg-gray-50"
                      >
                        Copy
                      </button>
                      <div className="flex items-center gap-2 ml-auto">
                        <input
                          type="datetime-local"
                          value={expandedDraft === draft.id ? draftScheduleDate : ''}
                          onChange={(e) => { setDraftScheduleDate(e.target.value); setExpandedDraft(draft.id); }}
                          onFocus={() => setExpandedDraft(draft.id)}
                          className="px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
                        />
                        <button
                          onClick={() => scheduleDraftedPost(draft.id)}
                          disabled={!draftScheduleDate || expandedDraft !== draft.id}
                          className="bg-green-600 text-white px-4 py-2 rounded-lg hover:bg-green-700 disabled:bg-gray-400 disabled:cursor-not-allowed transition-colors text-sm font-medium flex items-center"
                        >
                          <Icon name="send" size={14} className="mr-2" />
                          Schedule
                        </button>
                      </div>
                    </div>
                  </div>
                ))}

                {draftedPosts.length === 0 && (
                  <div className="text-center py-12 text-gray-500">
                    <Icon name="file-text" size={48} className="mx-auto mb-4 opacity-50" />
                    <p>No drafted posts yet.</p>
                    <p className="text-sm mt-2">Generate posts from starred ideas or wait for the agent to create drafts.</p>
                    <button onClick={() => setActiveTab('generate')} className="mt-3 text-blue-600 hover:text-blue-800 font-medium">Generate a post →</button>
                  </div>
                )}
              </div>
            </div>
          )}

          {/* Scheduled Posts Tab */}
          {activeTab === 'scheduled' && (
            <div>
              <div className="flex justify-between items-center mb-6">
                <h3 className="text-lg font-semibold">Scheduled Posts ({activeScheduledPosts.length})</h3>
              </div>
              <div className="space-y-4">
                {activeScheduledPosts.map(post => (
                  <div key={post.id} className="bg-white border border-gray-200 rounded-lg p-6">
                    <div className="flex justify-between items-start mb-4 flex-wrap gap-2">
                      <div className="flex items-center space-x-2">
                        <Icon name="clock" size={16} className="text-blue-600" />
                        {editingSchedule === post.id ? (
                          <input
                            type="datetime-local"
                            defaultValue={post.scheduledFor}
                            className="px-2 py-1 border border-gray-300 rounded text-sm"
                            onBlur={(e) => {
                              updateScheduledPost(post.id, { scheduledFor: e.target.value });
                              setEditingSchedule(null);
                            }}
                            autoFocus
                          />
                        ) : (
                          <button
                            className="font-medium text-gray-900 hover:text-blue-600 flex items-center gap-1 hover:bg-blue-50 px-2 py-1 rounded"
                            onClick={() => setEditingSchedule(post.id)}
                            title="Click to change scheduled time"
                          >
                            {new Date(post.scheduledFor).toLocaleString()}
                            <Icon name="pencil" size={14} className="text-gray-400" />
                          </button>
                        )}
                        <span className="px-2 py-1 text-xs rounded-full text-blue-600 bg-blue-100">
                          scheduled
                        </span>
                        {post.contributor && <span className="px-2 py-1 text-xs rounded-full bg-indigo-100 text-indigo-700">by {post.contributor}</span>}
                      </div>
                      <div className="flex items-center space-x-2 flex-wrap gap-1">
                        <button
                          onClick={() => setEditingSchedule(post.id)}
                          className="text-purple-600 hover:text-purple-800 px-2 py-1 text-xs border border-purple-600 rounded hover:bg-purple-50"
                        >
                          ✏️ Reschedule
                        </button>
                        <button
                          onClick={() => moveIdeaBackToQueue(post.id)}
                          className="text-gray-600 hover:text-gray-800 px-2 py-1 text-xs border border-gray-600 rounded hover:bg-gray-50"
                        >
                          ← Back to Ideas
                        </button>
                        <button
                          onClick={() => markAsPosted(post.id)}
                          className="text-green-600 hover:text-green-800 px-2 py-1 text-xs border border-green-600 rounded hover:bg-green-50"
                        >
                          ✓ Mark Posted
                        </button>
                        <button
                          onClick={() => copyToClipboard(post.content)}
                          className="text-blue-600 hover:text-blue-800 px-2 py-1 text-xs border border-blue-600 rounded hover:bg-blue-50"
                        >
                          Copy
                        </button>
                        <button
                          onClick={() => deleteScheduledPost(post.id)}
                          className="text-red-600 hover:text-red-800 p-1"
                        >
                          <Icon name="trash-2" size={16} />
                        </button>
                      </div>
                    </div>
                    <div className="bg-gray-50 p-4 rounded-lg">
                      {editingPost === post.id ? (
                        <div>
                          <textarea
                            defaultValue={post.content}
                            className="w-full h-40 p-3 border border-gray-300 rounded-lg resize-none focus:outline-none focus:ring-2 focus:ring-blue-500"
                            onBlur={(e) => {
                              updateScheduledPost(post.id, { content: e.target.value });
                              setEditingPost(null);
                            }}
                            autoFocus
                          />
                        </div>
                      ) : (
                        <pre
                          className="whitespace-pre-wrap text-sm text-gray-900 cursor-pointer hover:bg-gray-100 p-2 rounded font-sans"
                          onClick={() => setEditingPost(post.id)}
                          title="Click to edit post content"
                        >
                          {post.content}
                        </pre>
                      )}
                    </div>
                    {post.status === 'scheduled' && new Date(post.scheduledFor) < new Date() && (
                      <div className="mt-3 p-2 bg-yellow-50 border border-yellow-200 rounded text-sm text-yellow-800">
                        This post is overdue. Did you publish it manually?
                        <button
                          onClick={() => markAsPosted(post.id)}
                          className="ml-2 text-green-600 hover:text-green-800 font-medium"
                        >
                          Mark as Posted
                        </button>
                      </div>
                    )}
                  </div>
                ))}

                {scheduledPosts.length === 0 && (
                  <div className="text-center py-12 text-gray-500">
                    <Icon name="calendar" size={48} className="mx-auto mb-4 opacity-50" />
                    <p>No scheduled posts yet.</p>
                    <button
                      onClick={() => setActiveTab('generate')}
                      className="mt-3 text-blue-600 hover:text-blue-800 font-medium"
                    >
                      Generate your first post →
                    </button>
                  </div>
                )}
              </div>
            </div>
          )}

          {/* Posted Ideas Tab */}
          {activeTab === 'posted' && (
            <div>
              <div className="flex justify-between items-center mb-6 flex-wrap gap-2">
                <h3 className="text-lg font-semibold">Posted Ideas ({filteredPostedIdeas.length})</h3>
                <div className="flex items-center space-x-3">
                  <span className="text-sm text-gray-600">Filter:</span>
                  <select
                    value={postedCategoryFilter}
                    onChange={(e) => setPostedCategoryFilter(e.target.value)}
                    className="px-3 py-1 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
                  >
                    <option value="All">All Topics ({postedIdeas.length})</option>
                    {categories.map(category => (
                      <option key={category} value={category}>
                        {category} ({postedIdeas.filter(idea => idea.category === category).length})
                      </option>
                    ))}
                  </select>
                  <select
                    value={postedAudienceFilter}
                    onChange={(e) => setPostedAudienceFilter(e.target.value)}
                    className="px-3 py-1 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
                  >
                    <option value="All">All Audiences ({postedIdeas.length})</option>
                    {audiences.map(audience => (
                      <option key={audience} value={audience}>
                        {audience} ({postedIdeas.filter(idea => idea.audience === audience).length})
                      </option>
                    ))}
                  </select>
                </div>
              </div>

              {/* Table */}
              <div className="w-full overflow-x-auto">
                <table className="w-full border-collapse" style={{minWidth: '1100px'}}>
                  <thead>
                    <tr className="bg-gray-50 border border-gray-200">
                      <th className="text-left px-4 py-3 text-xs font-semibold text-gray-500 uppercase tracking-wide" style={{width: '28%'}}>Content</th>
                      <th className="text-center px-2 py-3 text-xs font-semibold text-gray-500 uppercase tracking-wide" style={{width: '13%'}}>Topic</th>
                      <th className="text-center px-2 py-3 text-xs font-semibold text-gray-500 uppercase tracking-wide" style={{width: '13%'}}>Audience</th>
                      <th className="text-center px-2 py-3 text-xs font-semibold text-gray-500 uppercase tracking-wide" style={{width: '7%'}}>Posted</th>
                      <th className="text-center px-2 py-3 text-xs font-semibold text-gray-500 uppercase tracking-wide" style={{width: '8%'}}>Views</th>
                      <th className="text-center px-2 py-3 text-xs font-semibold text-gray-500 uppercase tracking-wide" style={{width: '7%'}}>Likes</th>
                      <th className="text-center px-2 py-3 text-xs font-semibold text-gray-500 uppercase tracking-wide" style={{width: '8%'}}>Comments</th>
                      <th className="text-center px-2 py-3 text-xs font-semibold text-gray-500 uppercase tracking-wide" style={{width: '7%'}}>Shares</th>
                      <th className="text-center px-2 py-3 text-xs font-semibold text-gray-500 uppercase tracking-wide" style={{width: '8%'}}>% Rate</th>
                    </tr>
                  </thead>
                  <tbody className="divide-y divide-gray-100 border-x border-b border-gray-200">
                    {filteredPostedIdeas.map(postedIdea => (
                      <React.Fragment key={postedIdea.id}>
                        <tr className="hover:bg-gray-50 transition-colors">
                          {/* Content */}
                          <td className="px-4 py-3 cursor-pointer" onClick={() => setExpandedPostedIdea(expandedPostedIdea === postedIdea.id ? null : postedIdea.id)}>
                            <div className="flex items-start gap-2">
                              <span className="text-gray-400 text-xs mt-1 shrink-0">{expandedPostedIdea === postedIdea.id ? '▼' : '▶'}</span>
                              <p className="text-sm text-gray-900 font-medium" style={{display: '-webkit-box', WebkitLineClamp: 2, WebkitBoxOrient: 'vertical', overflow: 'hidden'}}>{postedIdea.ideaContent}</p>
                            </div>
                          </td>

                          {/* Topic */}
                          <td className="px-2 py-3 text-center">
                            <span className={`px-2 py-0.5 text-xs rounded-full ${getPriorityColor(postedIdea.category)}`}>
                              {postedIdea.category}
                            </span>
                          </td>

                          {/* Audience */}
                          <td className="px-2 py-3 text-center">
                            <span className="px-2 py-0.5 text-xs rounded-full bg-yellow-100 text-yellow-800">
                              {postedIdea.audience || '—'}
                            </span>
                          </td>

                          {/* Posted date */}
                          <td className="px-2 py-3 text-center text-xs text-gray-500 whitespace-nowrap">
                            {new Date(postedIdea.postedAt).toLocaleDateString('en-US', { month: 'short', day: 'numeric' })}
                          </td>

                          {/* Analytics */}
                          {['impressions', 'likes', 'comments', 'shares'].map(field => (
                            <td key={field} className="px-2 py-3 text-center">
                              <input
                                type="number"
                                min="0"
                                value={(postedIdea.analytics && postedIdea.analytics[field]) || ''}
                                onChange={(e) => updatePostedAnalytics(postedIdea.id, field, e.target.value)}
                                placeholder="—"
                                className="w-full px-1 py-1 text-sm text-center bg-transparent border border-transparent hover:border-gray-300 focus:border-blue-400 focus:bg-white rounded transition-colors outline-none font-medium text-gray-800"
                              />
                            </td>
                          ))}

                          {/* Engagement rate */}
                          <td className="px-2 py-3 text-center text-sm font-medium">
                            {postedIdea.analytics && Number(postedIdea.analytics.impressions) > 0 ? (
                              <span className="text-green-700">
                                {(((Number(postedIdea.analytics.likes || 0) + Number(postedIdea.analytics.comments || 0) + Number(postedIdea.analytics.shares || 0)) / Number(postedIdea.analytics.impressions) * 100)).toFixed(1)}%
                              </span>
                            ) : (
                              <span className="text-gray-300">—</span>
                            )}
                          </td>
                        </tr>

                        {/* Expanded detail */}
                        {expandedPostedIdea === postedIdea.id && (
                          <tr>
                            <td colSpan={9} className="px-4 pb-4 pt-2 bg-gray-50">
                              <div className="ml-6 grid grid-cols-1 md:grid-cols-2 gap-4">
                                <div>
                                  <h4 className="text-xs font-semibold text-gray-500 uppercase mb-2">Posted Content</h4>
                                  <div className="bg-green-50 p-3 rounded-lg border-l-4 border-green-400">
                                    <pre className="whitespace-pre-wrap text-sm text-gray-900 font-sans">{postedIdea.postedContent}</pre>
                                  </div>
                                </div>
                                <div className="space-y-3">
                                  <div className="flex items-center gap-4 text-xs text-gray-500 flex-wrap">
                                    <span>Created: {new Date(postedIdea.createdAt).toLocaleDateString()}</span>
                                    <span>Scheduled: {new Date(postedIdea.scheduledFor).toLocaleString()}</span>
                                    {postedIdea.contributor && <span className="px-2 py-0.5 rounded-full bg-indigo-100 text-indigo-700">by {postedIdea.contributor}</span>}
                                  </div>
                                  {(postedIdea.draft || postedIdea.comments) && (
                                    <div className="text-sm text-gray-600 bg-white p-3 rounded border">
                                      {postedIdea.draft && <p><span className="font-medium">Draft notes:</span> {postedIdea.draft}</p>}
                                      {postedIdea.comments && <p><span className="font-medium">Comments:</span> {postedIdea.comments}</p>}
                                    </div>
                                  )}
                                  <div className="flex gap-2">
                                    <button onClick={() => copyToClipboard(postedIdea.postedContent)} className="text-blue-600 hover:text-blue-800 px-3 py-1 text-xs border border-blue-300 rounded hover:bg-blue-50">Copy</button>
                                    <button onClick={() => setPostedIdeas(postedIdeas.filter(p => p.id !== postedIdea.id))} className="text-red-500 hover:text-red-700 px-3 py-1 text-xs border border-red-300 rounded hover:bg-red-50">Delete</button>
                                  </div>
                                </div>
                              </div>
                            </td>
                          </tr>
                        )}
                      </React.Fragment>
                    ))}

                    {postedIdeas.length === 0 && (
                      <tr>
                        <td colSpan={9} className="text-center py-12 text-gray-500">
                          <Icon name="check-circle" size={48} className="mx-auto mb-4 opacity-50" />
                          <p>No posted ideas yet.</p>
                          <p className="text-sm mt-2">Ideas will appear here once they're marked as posted.</p>
                        </td>
                      </tr>
                    )}
                  </tbody>
                </table>
              </div>
            </div>
          )}

          {/* Settings Modal */}
          {showSettings && (
            <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
              <div className="bg-white rounded-lg p-6 max-w-2xl w-full mx-4 max-h-[80vh] overflow-y-auto">
                <div className="flex justify-between items-center mb-6">
                  <h2 className="text-xl font-bold">Settings</h2>
                  <button
                    onClick={() => setShowSettings(false)}
                    className="text-gray-500 hover:text-gray-700 text-2xl"
                  >
                    ×
                  </button>
                </div>

                <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                  {/* Topics */}
                  <div>
                    <h3 className="font-semibold mb-3">Topics (Content Categories)</h3>
                    <div className="flex gap-2 mb-3">
                      <input
                        type="text"
                        value={newTopic}
                        onChange={(e) => setNewTopic(e.target.value)}
                        placeholder="Add new topic..."
                        className="flex-1 px-3 py-2 border border-gray-300 rounded-lg text-sm"
                        onKeyPress={(e) => e.key === 'Enter' && addTopic()}
                      />
                      <button
                        onClick={addTopic}
                        className="px-3 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 text-sm"
                      >
                        Add
                      </button>
                    </div>
                    <div className="space-y-2">
                      {topics.map(topic => (
                        <div key={topic} className="flex justify-between items-center bg-gray-50 px-3 py-2 rounded">
                          <span className="text-sm">{topic}</span>
                          <button
                            onClick={() => deleteTopic(topic)}
                            className="text-red-500 hover:text-red-700 text-sm"
                            disabled={topics.length <= 1}
                          >
                            ×
                          </button>
                        </div>
                      ))}
                    </div>
                  </div>

                  {/* Audiences */}
                  <div>
                    <h3 className="font-semibold mb-3">Audiences (Target Groups)</h3>
                    <div className="flex gap-2 mb-3">
                      <input
                        type="text"
                        value={newAudience}
                        onChange={(e) => setNewAudience(e.target.value)}
                        placeholder="Add new audience..."
                        className="flex-1 px-3 py-2 border border-gray-300 rounded-lg text-sm"
                        onKeyPress={(e) => e.key === 'Enter' && addAudience()}
                      />
                      <button
                        onClick={addAudience}
                        className="px-3 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 text-sm"
                      >
                        Add
                      </button>
                    </div>
                    <div className="space-y-2">
                      {audiences.map(audience => (
                        <div key={audience} className="flex justify-between items-center bg-gray-50 px-3 py-2 rounded">
                          <span className="text-sm">{audience}</span>
                          <button
                            onClick={() => deleteAudience(audience)}
                            className="text-red-500 hover:text-red-700 text-sm"
                            disabled={audiences.length <= 1}
                          >
                            ×
                          </button>
                        </div>
                      ))}
                    </div>
                  </div>
                </div>

                {/* API keys are managed via backend .env file and synced to Firebase automatically */}

                <div className="mt-6 flex justify-end">
                  <button
                    onClick={() => setShowSettings(false)}
                    className="px-4 py-2 bg-gray-600 text-white rounded-lg hover:bg-gray-700"
                  >
                    Done
                  </button>
                </div>
              </div>
            </div>
          )}

          {/* Footer */}
          <div className="mt-12 pt-6 border-t text-center text-sm text-gray-500">
            <p>Data is saved automatically in your browser. Use Export/Import to backup your data.</p>
          </div>
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<LinkedInContentSystem />);
  </script>
</body>
</html>
