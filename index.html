<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LinkedIn Content Tracker</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-database-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyBClelPfksWgYRO6oTd721hvWmItfIaFBY",
      authDomain: "linkedin-content-tracker.firebaseapp.com",
      databaseURL: "https://linkedin-content-tracker-default-rtdb.firebaseio.com",
      projectId: "linkedin-content-tracker",
      storageBucket: "linkedin-content-tracker.firebasestorage.app",
      messagingSenderId: "743006715017",
      appId: "1:743006715017:web:f660d4c480487c14f29a58"
    };
    const firebaseApp = firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const auth = firebase.auth();
    const googleProvider = new firebase.auth.GoogleAuthProvider();
  </script>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    // Icon components using Lucide
    const Icon = ({ name, size = 16, className = '' }) => {
      const ref = React.useRef(null);
      useEffect(() => {
        if (ref.current) {
          ref.current.innerHTML = '';
          const icon = lucide.createElement(lucide.icons[name]);
          icon.setAttribute('width', size);
          icon.setAttribute('height', size);
          if (className) icon.setAttribute('class', className);
          ref.current.appendChild(icon);
        }
      }, [name, size, className]);
      return <span ref={ref} style={{ display: 'inline-flex', verticalAlign: 'middle' }} />;
    };

    const LinkedInContentSystem = () => {
      const [ideas, setIdeas] = useState([]);
      const [scheduledPosts, setScheduledPosts] = useState([]);
      const [newIdea, setNewIdea] = useState('');
      const [selectedIdea, setSelectedIdea] = useState(null);
      const [generatedPost, setGeneratedPost] = useState('');
      const [scheduleDate, setScheduleDate] = useState('');
      const [activeTab, setActiveTab] = useState('ideas');
      const [editingPost, setEditingPost] = useState(null);
      const [editingSchedule, setEditingSchedule] = useState(null);
      const [expandedIdea, setExpandedIdea] = useState(null);
      const [categoryFilter, setCategoryFilter] = useState('All');
      const [editingIdeaContent, setEditingIdeaContent] = useState(null);
      const [postedIdeas, setPostedIdeas] = useState([]);
      const [postedCategoryFilter, setPostedCategoryFilter] = useState('All');
      const [postedAudienceFilter, setPostedAudienceFilter] = useState('All');
      const [expandedPostedIdea, setExpandedPostedIdea] = useState(null);
      const [audienceFilter, setAudienceFilter] = useState('All');
      const [showSettings, setShowSettings] = useState(false);
      const [newTopic, setNewTopic] = useState('');
      const [newAudience, setNewAudience] = useState('');
      const [firebaseReady, setFirebaseReady] = useState(false);
      const [contributorName, setContributorName] = useState('');
      const [currentUser, setCurrentUser] = useState(null);
      const [authLoading, setAuthLoading] = useState(true);

      const defaultTopics = ['User Pain Points', 'Market Trend', 'Good Practices', 'Professional Insights', 'Random'];
      const defaultAudiences = ['Currently Unemployed', 'Employed & Seeking', 'Career Changers', 'General'];

      const [topics, setTopics] = useState(defaultTopics);
      const [audiences, setAudiences] = useState(defaultAudiences);

      // Track whether state changes come from Firebase (to avoid write-back loops)
      const fromFirebase = React.useRef(false);

      const categories = topics;

      const [sourceFilter, setSourceFilter] = useState('All');

      const activeIdeas = ideas.filter(idea => idea.status !== 'posted');
      const filteredIdeas = activeIdeas.filter(idea => {
        const matchesCategory = categoryFilter === 'All' || idea.category === categoryFilter;
        const matchesAudience = audienceFilter === 'All' || idea.audience === audienceFilter;
        const matchesSource = sourceFilter === 'All' || (sourceFilter === 'Agent' ? idea.source === 'agent' : idea.source !== 'agent');
        return matchesCategory && matchesAudience && matchesSource;
      });

      const starredIdeas = activeIdeas.filter(idea => idea.starred);
      const activeScheduledPosts = scheduledPosts
        .filter(post => post.status !== 'posted')
        .sort((a, b) => new Date(a.scheduledFor) - new Date(b.scheduledFor));
      const filteredPostedIdeas = postedIdeas.filter(idea => {
        const matchesCategory = postedCategoryFilter === 'All' || idea.category === postedCategoryFilter;
        const matchesAudience = postedAudienceFilter === 'All' || idea.audience === postedAudienceFilter;
        return matchesCategory && matchesAudience;
      });

      // Google Auth — listen for auth state
      useEffect(() => {
        const unsubscribe = auth.onAuthStateChanged((user) => {
          setCurrentUser(user);
          if (user) {
            setContributorName(user.displayName || user.email.split('@')[0]);
          }
          setAuthLoading(false);
        });
        return () => unsubscribe();
      }, []);

      const signIn = () => {
        auth.signInWithPopup(googleProvider).catch((error) => {
          alert('Sign in failed: ' + error.message);
        });
      };

      const signOut = () => {
        auth.signOut();
      };

      // Firebase real-time listeners — load data and stay in sync
      useEffect(() => {
        const refs = {
          ideas: db.ref('ideas'),
          scheduledPosts: db.ref('scheduledPosts'),
          postedIdeas: db.ref('postedIdeas'),
          topics: db.ref('topics'),
          audiences: db.ref('audiences')
        };

        // Helper: migrate localStorage data to Firebase if Firebase is empty
        const migrateIfNeeded = (firebaseData, localKey, fbRef, defaultVal) => {
          if (!firebaseData) {
            const localData = localStorage.getItem(localKey);
            if (localData) {
              const parsed = JSON.parse(localData);
              if (parsed && (Array.isArray(parsed) ? parsed.length > 0 : true)) {
                fbRef.set(parsed);
                return parsed;
              }
            }
            return defaultVal;
          }
          return Array.isArray(firebaseData) ? firebaseData : Object.values(firebaseData || {});
        };

        refs.ideas.on('value', (snapshot) => {
          fromFirebase.current = true;
          const data = migrateIfNeeded(snapshot.val(), 'linkedin-ideas', refs.ideas, []);
          setIdeas(Array.isArray(data) ? data : Object.values(data || {}));
          fromFirebase.current = false;
          setFirebaseReady(true);
        });

        refs.scheduledPosts.on('value', (snapshot) => {
          fromFirebase.current = true;
          const data = migrateIfNeeded(snapshot.val(), 'linkedin-scheduled', refs.scheduledPosts, []);
          setScheduledPosts(Array.isArray(data) ? data : Object.values(data || {}));
          fromFirebase.current = false;
        });

        refs.postedIdeas.on('value', (snapshot) => {
          fromFirebase.current = true;
          const data = migrateIfNeeded(snapshot.val(), 'linkedin-posted-ideas', refs.postedIdeas, []);
          setPostedIdeas(Array.isArray(data) ? data : Object.values(data || {}));
          fromFirebase.current = false;
        });

        refs.topics.on('value', (snapshot) => {
          fromFirebase.current = true;
          const data = snapshot.val();
          if (data) {
            setTopics(Array.isArray(data) ? data : Object.values(data));
          } else {
            const localTopics = localStorage.getItem('linkedin-topics');
            if (localTopics) {
              const parsed = JSON.parse(localTopics);
              refs.topics.set(parsed);
              setTopics(parsed);
            } else {
              refs.topics.set(defaultTopics);
              setTopics(defaultTopics);
            }
          }
          fromFirebase.current = false;
        });

        refs.audiences.on('value', (snapshot) => {
          fromFirebase.current = true;
          const data = snapshot.val();
          if (data) {
            setAudiences(Array.isArray(data) ? data : Object.values(data));
          } else {
            const localAudiences = localStorage.getItem('linkedin-audiences');
            if (localAudiences) {
              const parsed = JSON.parse(localAudiences);
              refs.audiences.set(parsed);
              setAudiences(parsed);
            } else {
              refs.audiences.set(defaultAudiences);
              setAudiences(defaultAudiences);
            }
          }
          fromFirebase.current = false;
        });

        return () => {
          Object.values(refs).forEach(ref => ref.off());
        };
      }, []);

      // Save to Firebase when state changes (skip if change came from Firebase listener)
      useEffect(() => {
        if (!firebaseReady || fromFirebase.current) return;
        db.ref('ideas').set(ideas);
      }, [ideas]);

      useEffect(() => {
        if (!firebaseReady || fromFirebase.current) return;
        db.ref('scheduledPosts').set(scheduledPosts);
      }, [scheduledPosts]);

      useEffect(() => {
        if (!firebaseReady || fromFirebase.current) return;
        db.ref('postedIdeas').set(postedIdeas);
      }, [postedIdeas]);

      useEffect(() => {
        if (!firebaseReady || fromFirebase.current) return;
        db.ref('topics').set(topics);
      }, [topics]);

      useEffect(() => {
        if (!firebaseReady || fromFirebase.current) return;
        db.ref('audiences').set(audiences);
      }, [audiences]);

      const addTopic = () => {
        if (newTopic.trim() && !topics.includes(newTopic.trim())) {
          setTopics([...topics, newTopic.trim()]);
          setNewTopic('');
        }
      };

      const deleteTopic = (topic) => {
        if (topics.length > 1) {
          setTopics(topics.filter(t => t !== topic));
        }
      };

      const addAudience = () => {
        if (newAudience.trim() && !audiences.includes(newAudience.trim())) {
          setAudiences([...audiences, newAudience.trim()]);
          setNewAudience('');
        }
      };

      const deleteAudience = (audience) => {
        if (audiences.length > 1) {
          setAudiences(audiences.filter(a => a !== audience));
        }
      };

      const updateIdeaAudience = (id, audience) => {
        setIdeas(ideas.map(idea =>
          idea.id === id ? { ...idea, audience: audience } : idea
        ));
      };

      const addIdea = () => {
        if (newIdea.trim()) {
          const idea = {
            id: Date.now(),
            content: newIdea,
            category: topics[0] || 'Random',
            audience: audiences[0] || 'General',
            status: 'idea',
            createdAt: new Date().toISOString(),
            draft: '',
            comments: '',
            starred: false,
            contributor: contributorName || 'Unknown'
          };
          setIdeas([idea, ...ideas]);
          setNewIdea('');
        }
      };

      const deleteIdea = (id) => {
        setIdeas(ideas.filter(idea => idea.id !== id));
        if (selectedIdea?.id === id) {
          setSelectedIdea(null);
          setGeneratedPost('');
        }
      };

      const updateIdeaPriority = (id, priority) => {
        setIdeas(ideas.map(idea =>
          idea.id === id ? { ...idea, category: priority } : idea
        ));
      };

      const toggleStarred = (id) => {
        setIdeas(ideas.map(idea =>
          idea.id === id ? { ...idea, starred: !idea.starred } : idea
        ));
      };

      const generatePost = (idea) => {
        setSelectedIdea(idea);
        setActiveTab('generate');

        const templates = [
          `${idea.content.split(' ').slice(0, 8).join(' ')}...

Here's what I've learned:
- [Key insight 1]
- [Key insight 2]
- [Key insight 3]

The takeaway?
${idea.content.split('.')[0]}.

What's been your experience?

#JobSearch #CareerStrategy #AI`,

          `Unpopular opinion:
${idea.content.split('.')[0]}.

Everyone thinks:
- [Common misconception]
- [Another myth]

But the reality is:
- ${idea.content.split(' ').slice(0, 15).join(' ')}
- [Supporting point]

Agree or disagree?

#Entrepreneurship #JobSearch #StartupLife`,

          `I just realized something about ${idea.content.split(' ')[0].toLowerCase()}...

${idea.content}

Here's the hard truth:
Most people won't take action on this.

But if you do:
- [Benefit 1]
- [Benefit 2]
- [Benefit 3]

What's stopping you from making this change?

#CareerAdvice #PersonalGrowth #AI`
        ];

        const randomTemplate = templates[Math.floor(Math.random() * templates.length)];
        setGeneratedPost(randomTemplate);
      };

      const moveIdeaBackToQueue = (postId) => {
        const post = scheduledPosts.find(p => p.id === postId);
        if (post) {
          setIdeas(ideas.map(idea =>
            idea.id === post.ideaId
              ? { ...idea, status: 'idea' }
              : idea
          ));
          setScheduledPosts(scheduledPosts.filter(p => p.id !== postId));
        }
      };

      const updateIdeaField = (ideaId, field, value) => {
        setIdeas(ideas.map(idea =>
          idea.id === ideaId ? { ...idea, [field]: value } : idea
        ));
      };

      const schedulePost = () => {
        if (selectedIdea && generatedPost && scheduleDate) {
          const scheduledPost = {
            id: Date.now(),
            ideaId: selectedIdea.id,
            content: generatedPost,
            scheduledFor: scheduleDate,
            status: 'scheduled',
            createdAt: new Date().toISOString(),
            contributor: contributorName || 'Unknown'
          };

          setScheduledPosts([...scheduledPosts, scheduledPost]);
          setIdeas(ideas.map(idea =>
            idea.id === selectedIdea.id
              ? { ...idea, status: 'scheduled' }
              : idea
          ));

          setSelectedIdea(null);
          setGeneratedPost('');
          setScheduleDate('');
          setActiveTab('scheduled');
        }
      };

      const updateScheduledPost = (postId, updates) => {
        setScheduledPosts(scheduledPosts.map(post =>
          post.id === postId ? { ...post, ...updates } : post
        ));
      };

      const markAsPosted = (postId) => {
        const post = scheduledPosts.find(p => p.id === postId);
        if (post) {
          const originalIdea = ideas.find(idea => idea.id === post.ideaId);

          if (originalIdea) {
            const postedIdea = {
              id: Date.now() + Math.random(),
              originalIdeaId: originalIdea.id,
              ideaContent: originalIdea.content,
              category: originalIdea.category,
              audience: originalIdea.audience || '',
              postedContent: post.content,
              scheduledFor: post.scheduledFor,
              postedAt: new Date().toISOString(),
              createdAt: originalIdea.createdAt,
              draft: originalIdea.draft,
              comments: originalIdea.comments,
              contributor: originalIdea.contributor || post.contributor || 'Unknown',
              analytics: { impressions: '', likes: '', comments: '', shares: '' }
            };

            setPostedIdeas(prev => [postedIdea, ...prev]);
            setIdeas(ideas.map(idea =>
              idea.id === originalIdea.id
                ? { ...idea, status: 'posted' }
                : idea
            ));
          }

          setScheduledPosts(scheduledPosts.filter(p => p.id !== postId));
        }
      };

      const updatePostedAnalytics = (postedId, field, value) => {
        setPostedIdeas(postedIdeas.map(item =>
          item.id === postedId
            ? { ...item, analytics: { ...(item.analytics || {}), [field]: value } }
            : item
        ));
      };

      const deleteScheduledPost = (postId) => {
        const post = scheduledPosts.find(p => p.id === postId);
        setScheduledPosts(scheduledPosts.filter(p => p.id !== postId));

        if (post) {
          setIdeas(ideas.map(idea =>
            idea.id === post.ideaId
              ? { ...idea, status: 'idea' }
              : idea
          ));
        }
      };

      const copyToClipboard = async (text) => {
        try {
          await navigator.clipboard.writeText(text);
          alert('Post copied to clipboard!');
        } catch (err) {
          console.error('Failed to copy text: ', err);
        }
      };

      const exportData = () => {
        const data = {
          ideas: ideas,
          scheduledPosts: scheduledPosts,
          postedIdeas: postedIdeas,
          exportDate: new Date().toISOString(),
          version: '1.1'
        };

        const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `linkedin-content-backup-${new Date().toISOString().split('T')[0]}.json`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
      };

      const importData = (event) => {
        const file = event.target.files[0];
        if (file) {
          const reader = new FileReader();
          reader.onload = (e) => {
            try {
              const data = JSON.parse(e.target.result);
              // Backfill audience on posted ideas from original ideas
              if (data.postedIdeas && data.ideas) {
                data.postedIdeas = data.postedIdeas.map(posted => {
                  if (!posted.audience) {
                    const original = data.ideas.find(i => i.id === posted.originalIdeaId);
                    return { ...posted, audience: original ? original.audience : '' };
                  }
                  return posted;
                });
              }
              if (data.ideas) db.ref('ideas').set(data.ideas);
              if (data.scheduledPosts) db.ref('scheduledPosts').set(data.scheduledPosts);
              if (data.postedIdeas) db.ref('postedIdeas').set(data.postedIdeas);
              if (data.topics) db.ref('topics').set(data.topics);
              if (data.audiences) db.ref('audiences').set(data.audiences);
              alert('Data imported successfully!');
            } catch (error) {
              alert('Error importing data: ' + error.message);
            }
          };
          reader.readAsText(file);
        }
      };

      const getPriorityColor = (category) => {
        switch(category) {
          case 'User Pain Points': return 'text-red-700 bg-red-100';
          case 'Market Trend': return 'text-blue-700 bg-blue-100';
          case 'Good Practices': return 'text-green-700 bg-green-100';
          case 'Professional Insights': return 'text-purple-700 bg-purple-100';
          case 'Random': return 'text-gray-700 bg-gray-100';
          default: return 'text-gray-600 bg-gray-100';
        }
      };

      if (authLoading) {
        return (
          <div className="max-w-md mx-auto mt-20 p-8 text-center">
            <p className="text-gray-500 text-lg">Loading...</p>
          </div>
        );
      }

      if (!currentUser) {
        return (
          <div className="max-w-md mx-auto mt-20 p-8 bg-white rounded-xl shadow-lg text-center">
            <h2 className="text-2xl font-bold text-gray-900 mb-2">LinkedIn Content Tracker</h2>
            <p className="text-gray-600 mb-6">Sign in to access your shared content workspace.</p>
            <button
              onClick={signIn}
              className="w-full px-6 py-3 bg-blue-600 text-white rounded-lg hover:bg-blue-700 font-medium flex items-center justify-center gap-2 mx-auto"
            >
              <svg className="w-5 h-5" viewBox="0 0 24 24"><path fill="#fff" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/><path fill="#fff" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#fff" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#fff" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
              Sign in with Google
            </button>
          </div>
        );
      }

      return (
        <div className="max-w-7xl mx-auto p-6 bg-white min-h-screen">
          <div className="mb-8">
            <div className="flex justify-between items-center flex-wrap gap-4">
              <div>
                <h1 className="text-3xl font-bold text-gray-900 mb-2">LinkedIn Content Tracker</h1>
                <p className="text-gray-600">Capture ideas → Generate posts → Schedule publishing</p>
              </div>
              <div className="flex items-center space-x-2">
                <span className="px-3 py-1.5 bg-indigo-50 text-indigo-700 rounded-full text-sm font-medium flex items-center gap-2">
                  {currentUser?.photoURL && <img src={currentUser.photoURL} className="w-5 h-5 rounded-full" />}
                  {contributorName}
                  <button onClick={signOut} className="text-indigo-400 hover:text-indigo-600 ml-1" title="Sign out">&times;</button>
                </span>
                <button
                  onClick={() => setShowSettings(true)}
                  className="px-4 py-2 bg-gray-600 text-white rounded-lg hover:bg-gray-700 text-sm"
                >
                  Settings
                </button>
                <button
                  onClick={exportData}
                  className="px-4 py-2 bg-green-600 text-white rounded-lg hover:bg-green-700 text-sm"
                >
                  Export Backup
                </button>
                <label className="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 cursor-pointer text-sm">
                  Import Backup
                  <input
                    type="file"
                    accept=".json"
                    onChange={importData}
                    className="hidden"
                  />
                </label>
              </div>
            </div>
          </div>

          {/* Navigation Tabs */}
          <div className="flex space-x-1 mb-6 flex-wrap gap-2">
            {[
              { id: 'ideas', label: 'Ideas Bank', icon: 'pencil' },
              { id: 'generate', label: 'Generate Post', icon: 'star' },
              { id: 'scheduled', label: 'Scheduled', icon: 'calendar' },
              { id: 'posted', label: 'Posted Ideas', icon: 'check-circle' }
            ].map(tab => (
              <button
                key={tab.id}
                onClick={() => setActiveTab(tab.id)}
                className={`flex items-center space-x-2 px-4 py-2 rounded-lg font-medium transition-colors ${
                  activeTab === tab.id
                    ? 'bg-blue-600 text-white'
                    : 'bg-gray-100 text-gray-700 hover:bg-gray-200'
                }`}
              >
                <Icon name={tab.icon} size={16} />
                <span>{tab.label}</span>
                {tab.id === 'ideas' && <span className="bg-white bg-opacity-20 text-xs px-2 py-1 rounded-full">{activeIdeas.length}</span>}
                {tab.id === 'scheduled' && <span className="bg-white bg-opacity-20 text-xs px-2 py-1 rounded-full">{activeScheduledPosts.length}</span>}
                {tab.id === 'posted' && <span className="bg-white bg-opacity-20 text-xs px-2 py-1 rounded-full">{postedIdeas.length}</span>}
              </button>
            ))}
          </div>

          {/* Ideas Tab */}
          {activeTab === 'ideas' && (
            <div className="space-y-6">
              {/* Add New Idea - Full Width */}
              <div className="bg-gray-50 p-6 rounded-lg">
                <h3 className="text-lg font-semibold mb-4 flex items-center">
                  <Icon name="plus" size={20} className="mr-2" />
                  Add New Idea
                </h3>
                <textarea
                  value={newIdea}
                  onChange={(e) => setNewIdea(e.target.value)}
                  placeholder="What's your idea? Could be a rough thought, observation, or experience you want to share..."
                  className="w-full h-32 p-3 border border-gray-300 rounded-lg resize-y focus:outline-none focus:ring-2 focus:ring-blue-500"
                  onKeyPress={(e) => {
                    if (e.key === 'Enter' && e.metaKey) {
                      addIdea();
                    }
                  }}
                />
                <button
                  onClick={addIdea}
                  className="mt-3 w-full bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700 transition-colors flex items-center justify-center"
                >

                            {new Date(postedIdea.postedAt).toLocaleDateString('en-US', { month: 'short', day: 'numeric' })}
                          </td>

                          {/* Analytics */}
                          {['impressions', 'likes', 'comments', 'shares'].map(field => (
                            <td key={field} className="px-2 py-3 text-center">
                              <input
                                type="number"
                                min="0"
                                value={(postedIdea.analytics && postedIdea.analytics[field]) || ''}
                                onChange={(e) => updatePostedAnalytics(postedIdea.id, field, e.target.value)}
                                placeholder="—"
                                className="w-full px-1 py-1 text-sm text-center bg-transparent border border-transparent hover:border-gray-300 focus:border-blue-400 focus:bg-white rounded transition-colors outline-none font-medium text-gray-800"
                              />
                            </td>
                          ))}

                          {/* Engagement rate */}
                          <td className="px-2 py-3 text-center text-sm font-medium">
                            {postedIdea.analytics && Number(postedIdea.analytics.impressions) > 0 ? (
                              <span className="text-green-700">
                                {(((Number(postedIdea.analytics.likes || 0) + Number(postedIdea.analytics.comments || 0) + Number(postedIdea.analytics.shares || 0)) / Number(postedIdea.analytics.impressions) * 100)).toFixed(1)}%
                              </span>
                            ) : (
                              <span className="text-gray-300">—</span>
                            )}
                          </td>
                        </tr>

                        {/* Expanded detail */}
                        {expandedPostedIdea === postedIdea.id && (
                          <tr>
                            <td colSpan={9} className="px-4 pb-4 pt-2 bg-gray-50">
                              <div className="ml-6 grid grid-cols-1 md:grid-cols-2 gap-4">
                                <div>
                                  <h4 className="text-xs font-semibold text-gray-500 uppercase mb-2">Posted Content</h4>
                                  <div className="bg-green-50 p-3 rounded-lg border-l-4 border-green-400">
                                    <pre className="whitespace-pre-wrap text-sm text-gray-900 font-sans">{postedIdea.postedContent}</pre>
                                  </div>
                                </div>
                                <div className="space-y-3">
                                  <div className="flex items-center gap-4 text-xs text-gray-500 flex-wrap">
                                    <span>Created: {new Date(postedIdea.createdAt).toLocaleDateString()}</span>
                                    <span>Scheduled: {new Date(postedIdea.scheduledFor).toLocaleString()}</span>
                                    {postedIdea.contributor && <span className="px-2 py-0.5 rounded-full bg-indigo-100 text-indigo-700">by {postedIdea.contributor}</span>}
                                  </div>
                                  {(postedIdea.draft || postedIdea.comments) && (
                                    <div className="text-sm text-gray-600 bg-white p-3 rounded border">
                                      {postedIdea.draft && <p><span className="font-medium">Draft notes:</span> {postedIdea.draft}</p>}
                                      {postedIdea.comments && <p><span className="font-medium">Comments:</span> {postedIdea.comments}</p>}
                                    </div>
                                  )}
                                  <div className="flex gap-2">
                                    <button onClick={() => copyToClipboard(postedIdea.postedContent)} className="text-blue-600 hover:text-blue-800 px-3 py-1 text-xs border border-blue-300 rounded hover:bg-blue-50">Copy</button>
                                    <button onClick={() => setPostedIdeas(postedIdeas.filter(p => p.id !== postedIdea.id))} className="text-red-500 hover:text-red-700 px-3 py-1 text-xs border border-red-300 rounded hover:bg-red-50">Delete</button>
                                  </div>
                                </div>
                              </div>
                            </td>
                          </tr>
                        )}
                      </React.Fragment>
                    ))}

                    {postedIdeas.length === 0 && (
                      <tr>
                        <td colSpan={9} className="text-center py-12 text-gray-500">
                          <Icon name="check-circle" size={48} className="mx-auto mb-4 opacity-50" />
                          <p>No posted ideas yet.</p>
                          <p className="text-sm mt-2">Ideas will appear here once they're marked as posted.</p>
                        </td>
                      </tr>
                    )}
                  </tbody>
                </table>
              </div>
            </div>
          )}

          {/* Settings Modal */}
          {showSettings && (
            <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
              <div className="bg-white rounded-lg p-6 max-w-2xl w-full mx-4 max-h-[80vh] overflow-y-auto">
                <div className="flex justify-between items-center mb-6">
                  <h2 className="text-xl font-bold">Settings</h2>
                  <button
                    onClick={() => setShowSettings(false)}
                    className="text-gray-500 hover:text-gray-700 text-2xl"
                  >
                    ×
                  </button>
                </div>

                <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                  {/* Topics */}
                  <div>
                    <h3 className="font-semibold mb-3">Topics (Content Categories)</h3>
                    <div className="flex gap-2 mb-3">
                      <input
                        type="text"
                        value={newTopic}
                        onChange={(e) => setNewTopic(e.target.value)}
                        placeholder="Add new topic..."
                        className="flex-1 px-3 py-2 border border-gray-300 rounded-lg text-sm"
                        onKeyPress={(e) => e.key === 'Enter' && addTopic()}
                      />
                      <button
                        onClick={addTopic}
                        className="px-3 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 text-sm"
                      >
                        Add
                      </button>
                    </div>
                    <div className="space-y-2">
                      {topics.map(topic => (
                        <div key={topic} className="flex justify-between items-center bg-gray-50 px-3 py-2 rounded">
                          <span className="text-sm">{topic}</span>
                          <button
                            onClick={() => deleteTopic(topic)}
                            className="text-red-500 hover:text-red-700 text-sm"
                            disabled={topics.length <= 1}
                          >
                            ×
                          </button>
                        </div>
                      ))}
                    </div>
                  </div>

                  {/* Audiences */}
                  <div>
                    <h3 className="font-semibold mb-3">Audiences (Target Groups)</h3>
                    <div className="flex gap-2 mb-3">
                      <input
                        type="text"
                        value={newAudience}
                        onChange={(e) => setNewAudience(e.target.value)}
                        placeholder="Add new audience..."
                        className="flex-1 px-3 py-2 border border-gray-300 rounded-lg text-sm"
                        onKeyPress={(e) => e.key === 'Enter' && addAudience()}
                      />
                      <button
                        onClick={addAudience}
                        className="px-3 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 text-sm"
                      >
                        Add
                      </button>
                    </div>
                    <div className="space-y-2">
                      {audiences.map(audience => (
                        <div key={audience} className="flex justify-between items-center bg-gray-50 px-3 py-2 rounded">
                          <span className="text-sm">{audience}</span>
                          <button
                            onClick={() => deleteAudience(audience)}
                            className="text-red-500 hover:text-red-700 text-sm"
                            disabled={audiences.length <= 1}
                          >
                            ×
                          </button>
                        </div>
                      ))}
                    </div>
                  </div>
                </div>

                <div className="mt-6 flex justify-end">
                  <button
                    onClick={() => setShowSettings(false)}
                    className="px-4 py-2 bg-gray-600 text-white rounded-lg hover:bg-gray-700"
                  >
                    Done
                  </button>
                </div>
              </div>
            </div>
          )}

          {/* Footer */}
          <div className="mt-12 pt-6 border-t text-center text-sm text-gray-500">
            <p>Data is saved automatically in your browser. Use Export/Import to backup your data.</p>
          </div>
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<LinkedInContentSystem />);
  </script>
</body>
</html>
